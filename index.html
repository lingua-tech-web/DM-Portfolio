<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon Portfolio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { background: #0a0f1e; color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .hero { display: flex; align-items: center; gap: 60px; max-width: 1200px; background: radial-gradient(circle at 70% 30%, #1e3a8a 0%, #0a0f1e 50%); padding: 60px; border-radius: 20px; }
    .hero img { width: 400px; height: 500px; object-fit: cover; border-radius: 15px; filter: grayscale(100%); }
    .hero-text h1 { font-size: 48px; font-weight: 700; line-height: 1.2; margin-bottom: 15px; }
    .hero-text p { color: #60a5fa; margin-bottom: 30px; font-size: 16px; }
    .tags { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 30px; }
    .tag { background: rgba(255, 255, 255, 0.1); padding: 8px 16px; border-radius: 20px; font-size: 14px; border: 1px solid rgba(255, 255, 255, 0.2); }
    .buttons { display: flex; gap: 15px; }
    .btn { padding: 12px 24px; border-radius: 8px; border: none; cursor: pointer; font-size: 15px; font-weight: 600; transition: 0.3s; }
    .btn-primary { background: #2563eb; color: white; }
    .btn-secondary { background: transparent; color: white; border: 1px solid #2563eb; }
    @media (max-width: 900px) { .hero { flex-direction: column; padding: 30px; } .hero img { width: 100%; height: 400px; } .hero-text h1 { font-size: 32px; } }
  </style>
</head>
<body>
  <section class="hero">
    <img src="ta-photo.jpg" alt="Ta photo">
    <div class="hero-text">
      <h1>Je construis des<br>solutions digitales qui<br>transforment ton activité</h1>
      <p>Développeur Fullstack — Je construis des solutions simples et efficaces</p>
      <div class="tags">
        <span class="tag">Site web</span>
        <span class="tag">Application</span>
        <span class="tag">Automatisation</span>
        <span class="tag">Design moderne</span>
      </div>
      <div class="buttons">
        <button class="btn btn-primary">J'ai un besoin</button>
        <button class="btn btn-secondary">Je découvre</button>
      </div>
    </div>
  </section>
</body>
</html>
